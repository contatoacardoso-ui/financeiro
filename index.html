<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro Mobile</title>
    
    <!-- Configurações PWA (Ícone na Tela Inicial) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Financeiro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">

    <!-- Manifesto embutido para criar o ícone de instalação em Tela Cheia (standalone) -->
    <link rel="manifest" href='data:application/json,{"name":"Controle Financeiro","short_name":"Financeiro","start_url":".","display":"standalone","background_color":"#121214","theme_color":"#121214","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2489/2489756.png","sizes":"512x512","type":"image/png"}]}' />

    <!-- Firebase SDKs compatíveis para rodar direto no navegador -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1d1d22;
            --text-color: #e1e1e6;
            --text-secondary: #a8a8b3;
            --primary: #4ea8de;
            --primary-hover: #3a8fc2;
            --income: #00b37e;
            --expense: #f75a68;
            --border: #29292e;
            --warning: #ffb86c;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            padding-bottom: 60px;
        }
        
        /* Botão Flutuante de Instalação no Topo */
        .install-banner {
            display: none;
            background-color: rgba(78, 168, 222, 0.15);
            border: 1px solid var(--primary);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: center;
            align-items: center;
            justify-content: space-between;
        }
        .install-banner p {
            font-size: 0.85rem;
            font-weight: 500;
        }
        .install-banner button {
            background-color: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Tela de Login */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 320px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px 24px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .login-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        .login-card h2 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .login-card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .login-card input {
            text-align: center;
            font-size: 1.1rem;
            padding: 12px;
            margin-bottom: 16px;
        }
        .login-error {
            color: var(--expense);
            font-size: 0.8rem;
            margin-bottom: 12px;
            display: none;
        }

        /* Container do Aplicativo Principal */
        #app-container {
            display: none;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }
        header h1 {
            font-size: 1.4rem;
        }
        
        /* Overlay de carregamento inicial */
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 20, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .balance-card {
            grid-column: span 2;
            background: linear-gradient(135deg, #202024 0%, #121214 100%);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            display: flex;
            justify-content: space-around;
        }
        .balance-sub-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .balance-value {
            font-size: 1.4rem;
            font-weight: bold;
        }
        .mini-card {
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .mini-card h4 {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .mini-card p {
            font-size: 1rem;
            font-weight: bold;
        }
        .income-text { color: var(--income); }
        .expense-text { color: var(--expense); }

        /* Acordeão de Cadastro (Novo Lançamento Expansível) */
        .form-accordion {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .form-accordion summary {
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .form-accordion summary::-webkit-details-marker {
            display: none;
        }
        .form-accordion summary::after {
            content: "➕";
            font-size: 0.85rem;
            color: var(--primary);
            transition: transform 0.2s;
        }
        .form-accordion[open] summary {
            border-bottom: 1px solid var(--border);
            background-color: rgba(255, 255, 255, 0.02);
        }
        .form-accordion[open] summary::after {
            content: "➖";
        }
        .form-content {
            padding: 16px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 10px;
            background-color: #121214;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.95rem;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
        }
        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .radio-btn {
            position: relative;
        }
        .radio-btn input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .radio-label {
            display: block;
            text-align: center;
            padding: 10px;
            background-color: #121214;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .radio-btn input:checked + .radio-label.lbl-receber {
            border-color: var(--income);
            background-color: rgba(0, 179, 126, 0.1);
            color: var(--income);
        }
        .radio-btn input:checked + .radio-label.lbl-pagar {
            border-color: var(--expense);
            background-color: rgba(247, 90, 104, 0.1);
            color: var(--expense);
        }
        .radio-btn input:checked + .radio-label.lbl-debito {
            border-color: var(--primary);
            background-color: rgba(78, 168, 222, 0.1);
            color: var(--primary);
        }
        .radio-btn input:checked + .radio-label.lbl-credito {
            border-color: var(--warning);
            background-color: rgba(255, 184, 108, 0.1);
            color: var(--warning);
        }

        /* Botão Lindo de Lançamento */
        button.submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, #3a9ec2 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(78, 168, 222, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            margin-top: 8px;
        }
        button.submit-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(78, 168, 222, 0.1);
            opacity: 0.9;
        }

        /* Campos Condicionais das Despesas */
        #expense-conditional-fields {
            display: none;
            border-left: 2px solid var(--border);
            padding-left: 12px;
            margin-top: 10px;
            margin-bottom: 12px;
        }
        #credit-fields {
            display: none;
            margin-top: 10px;
        }

        /* Filtro de Meses Deslizável */
        .month-selector {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .month-selector::-webkit-scrollbar {
            height: 4px;
        }
        .month-selector::-webkit-scrollbar-thumb {
            background-color: var(--border);
            border-radius: 4px;
        }
        .month-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }
        .month-btn.active {
            background-color: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* Abas de Navegação (Pendentes vs Realizados) */
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .tab-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .tab-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background-color: rgba(78, 168, 222, 0.1);
        }

        /* Lista de Lançamentos */
        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .transaction-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-details h4 {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }
        .item-details span {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: block;
        }
        .item-details .method-badge {
            font-size: 0.65rem;
            color: var(--text-secondary);
            background-color: rgba(255,255,255,0.05);
            padding: 1px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }
        .item-details .delay-tag {
            color: var(--expense);
            font-weight: 600;
            font-size: 0.7rem;
            display: inline-block;
            margin-left: 6px;
        }
        .item-right {
            text-align: right;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .value-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
        }
        .value-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .edit-value-btn {
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0.6;
            padding: 4px;
        }
        .edit-value-btn:active {
            opacity: 1;
        }
        .item-value {
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        /* Botões de Ação */
        .item-actions-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .confirm-btn {
            color: var(--income);
            border: 1px solid rgba(0, 179, 126, 0.3);
        }
        .confirm-btn:active {
            background-color: rgba(0, 179, 126, 0.2);
        }
        .delete-btn {
            color: var(--text-secondary);
            font-size: 1.3rem;
            border: 1px solid rgba(168, 168, 179, 0.15);
        }
        .delete-btn:active {
            color: var(--expense);
            border-color: rgba(247, 90, 104, 0.3);
            background-color: rgba(247, 90, 104, 0.1);
        }
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px 0;
            font-size: 0.85rem;
        }

        /* Configurações de Segurança no Rodapé */
        .security-footer {
            margin-top: 40px;
            margin-bottom: 20px;
        }
        .security-accordion {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .security-header-btn {
            width: 100%;
            background: none;
            border: none;
            padding: 16px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            outline: none;
        }
        .security-header-btn:active {
            background-color: rgba(255, 255, 255, 0.02);
        }
        .security-header-btn.is-open {
            border-bottom: 1px solid var(--border);
            color: var(--text-color);
            background-color: rgba(255, 255, 255, 0.02);
        }
        .security-panel-content {
            display: none;
            flex-direction: column;
        }
        .security-panel-content button {
            background: none;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            color: var(--text-color);
            font-size: 0.85rem;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            outline: none;
        }
        .security-panel-content button:last-child {
            border-bottom: none;
        }
        .security-panel-content button:active {
            background-color: rgba(255,255,255,0.05);
        }
        .security-panel-content button.danger-btn {
            color: var(--expense);
        }
    </style>
</head>
<body>

    <!-- Tela de Login -->
    <div id="login-screen">
        <div class="login-card">
            <div class="login-icon">🔒</div>
            <h2>Acesso Restrito</h2>
            <p>Insira a senha para acessar o Financeiro</p>
            <form id="login-form">
                <input type="password" id="login-password" placeholder="Senha do App" required autocomplete="current-password">
                <div class="login-error" id="login-error">Senha incorreta. Tente novamente.</div>
                <button type="submit" class="submit-btn">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Overlay de carregamento pós-login -->
    <div id="loading">Conectando ao banco de dados...</div>

    <!-- Aplicativo Principal -->
    <div id="app-container">
        
        <!-- Banner de Instalação de Aplicativo -->
        <div id="install-banner" class="install-banner">
            <p>📲 Use como aplicativo em tela cheia!</p>
            <button id="install-btn">Instalar</button>
        </div>

        <header>
            <h1>Controle Financeiro</h1>
        </header>

        <!-- Dashboard GLOBAL -->
        <div class="dashboard">
            <div class="balance-card">
                <div class="balance-sub-card">
                    <h3>Saldo Real</h3>
                    <div class="balance-value income-text" id="real-balance">R$ 0,00</div>
                </div>
                <div style="border-left: 1px solid var(--border)"></div>
                <div class="balance-sub-card">
                    <h3>Saldo Previsto</h3>
                    <div class="balance-value" id="total-balance">R$ 0,00</div>
                </div>
            </div>
            <div class="mini-card">
                <h4>A Receber</h4>
                <p class="income-text" id="total-income">R$ 0,00</p>
            </div>
            <div class="mini-card">
                <h4>A Pagar</h4>
                <p class="expense-text" id="total-expense">R$ 0,00</p>
            </div>
        </div>

        <!-- ACORDEÃO DE CADASTRO -->
        <details class="form-accordion" id="form-accordion">
            <summary>➕ Novo Lançamento</summary>
            <div class="form-content">
                <form id="finance-form">
                    
                    <!-- Passo 1: Seleção de Tipo -->
                    <div class="form-group">
                        <label>Tipo de Transação</label>
                        <div class="radio-group">
                            <div class="radio-btn">
                                <input type="radio" id="type-receber" name="type" value="receber" checked onclick="toggleMethodFields()">
                                <label for="type-receber" class="radio-label lbl-receber">A Receber</label>
                            </div>
                            <div class="radio-btn">
                                <input type="radio" id="type-pagar" name="type" value="pagar" onclick="toggleMethodFields()">
                                <label for="type-pagar" class="radio-label lbl-pagar">A Pagar</label>
                            </div>
                        </div>
                    </div>

                    <!-- Bloco Condicional se for A Pagar -->
                    <div id="expense-conditional-fields">
                        <!-- Passo 2: Seleção de Forma de Lançamento -->
                        <div class="form-group" style="margin-bottom: 12px;">
                            <label>Forma de Lançamento</label>
                            <div class="radio-group">
                                <div class="radio-btn">
                                    <input type="radio" id="method-debito" name="method" value="debito" checked onclick="toggleCreditFields(false)">
                                    <label for="method-debito" class="radio-label lbl-debito">Dinheiro/Débito</label>
                                </div>
                                <div class="radio-btn">
                                    <input type="radio" id="method-credito" name="method" value="credito" onclick="toggleCreditFields(true)">
                                    <label for="method-credito" class="radio-label lbl-credito">Cartão de Crédito</label>
                                </div>
                            </div>
                        </div>

                        <!-- Novo Campo Comum: Origem / Cartão Informado -->
                        <div class="form-group">
                            <label for="card-origin">Origem / Cartão</label>
                            <input type="text" id="card-origin" placeholder="Ex: Nubank, Itaú, Dinheiro" autocomplete="off">
                        </div>

                        <!-- Passo 3: Parcelas Condicionais (Se Crédito) -->
                        <div id="credit-fields">
                            <div class="form-group">
                                <label for="installments">Quantidade de Parcelas</label>
                                <input type="number" id="installments" value="1" min="1" max="72">
                            </div>
                        </div>
                    </div>

                    <!-- Passo 4: Detalhes do Lançamento -->
                    <div class="form-group">
                        <label for="description">Descrição</label>
                        <input type="text" id="description" placeholder="Ex: Aluguel, Supermercado" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="amount">Valor Total (R$)</label>
                        <input type="text" id="amount" placeholder="0,00" required inputmode="numeric">
                    </div>

                    <div class="form-group">
                        <label for="due-date" id="date-label">Data de Recebimento</label>
                        <input type="date" id="due-date" required>
                    </div>

                    <button type="submit" class="submit-btn" id="btn-salvar-lancamento">
                        <span>✨</span> Salvar Lançamento
                    </button>
                </form>
            </div>
        </details>

        <!-- FILTROS DE VISUALIZAÇÃO -->
        <div class="month-selector" id="month-selector"></div>

        <!-- Abas Pendentes / Realizados -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">Pendentes</button>
            <button class="tab-btn" id="tab-done" onclick="switchTab('done')">Realizados</button>
        </div>

        <!-- Lista de Lançamentos -->
        <div>
            <div class="transaction-list" id="transaction-list"></div>
        </div>

        <!-- MENU DE SEGURANÇA SEGURO NO RODAPÉ -->
        <div class="security-footer">
            <div class="security-accordion">
                <button class="security-header-btn" id="security-toggle-btn" onclick="tentarAbrirConfiguracoes()">
                    <span>⚙️</span> Configurações de Segurança
                </button>
                <div class="security-panel-content" id="security-panel-content">
                    <button onclick="fazerBackup()">
                        <span>📥</span> Exportar Dados (Backup)
                    </button>
                    <button onclick="alterarSenhaDoSistema()">
                        <span>🔑</span> Alterar Senha
                    </button>
                    <button onclick="fazerLogout()">
                        <span>🔒</span> Bloquear App
                    </button>
                    <button class="danger-btn" onclick="limparBancoDeDados()">
                        <span>🗑️</span> Zerar Banco de Dados
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTES DE SEGURANÇA ---
        const SENHA_PADRAO = "Touchrio@8512@";
        const CHAVE_DE_RECUPERACAO = "uXgPdnTq3HFIi19mjp9EZwquTUyukZ76PdrldkNM";
        
        const loginScreen = document.getElementById('login-screen');
        const loginForm = document.getElementById('login-form');
        const loginPassword = document.getElementById('login-password');
        const loginError = document.getElementById('login-error');
        const appContainer = document.getElementById('app-container');
        const loadingEl = document.getElementById('loading');
        
        const securityToggleBtn = document.getElementById('security-toggle-btn');
        const securityPanelContent = document.getElementById('security-panel-content');

        function obterSenhaAtual() {
            return localStorage.getItem('finance_app_pwd') || SENHA_PADRAO;
        }

        // --- CONTROLE DINÂMICO DOS CAMPOS ---
        window.toggleMethodFields = function() {
            const isPagar = document.querySelector('input[name="type"]:checked').value === 'pagar';
            document.getElementById('expense-conditional-fields').style.display = isPagar ? 'block' : 'none';
            
            if (!isPagar) {
                toggleCreditFields(false);
                document.getElementById('date-label').textContent = 'Data de Recebimento';
            } else {
                const isCredito = document.getElementById('method-credito').checked;
                toggleCreditFields(isCredito);
            }
        }

        window.toggleCreditFields = function(show) {
            const isPagar = document.querySelector('input[name="type"]:checked').value === 'pagar';
            document.getElementById('credit-fields').style.display = show ? 'block' : 'none';
            
            if (isPagar) {
                document.getElementById('date-label').textContent = show ? 'Mês da 1ª Cobrança / Vencimento' : 'Data do Pagamento';
            } else {
                document.getElementById('date-label').textContent = 'Data de Recebimento';
            }
        }

        window.tentarAbrirConfiguracoes = function() {
            if (securityPanelContent.style.display === 'flex') {
                fecharPainelDeSeguranca();
                return;
            }
            const senhaDigitada = prompt("Insira a Senha do App para gerenciar as Configurações de Segurança:");
            if (senhaDigitada === obterSenhaAtual()) {
                abrirPainelDeSeguranca();
            } else if (senhaDigitada !== null) {
                alert("Erro: Senha incorreta. Acesso negado.");
                fecharPainelDeSeguranca();
            }
        }

        function abrirPainelDeSeguranca() {
            securityPanelContent.style.display = 'flex';
            securityToggleBtn.classList.add('is-open');
        }

        function fecharPainelDeSeguranca() {
            securityPanelContent.style.display = 'none';
            securityToggleBtn.classList.remove('is-open');
        }

        // --- SEGURANÇA E ADMINISTRAÇÃO ---
        window.alterarSenhaDoSistema = function() {
            const chave = prompt("Insira a Chave de Recuperação (Database Secret) para liberar a alteração:");
            if (!chave) return;
            if (chave.trim() === CHAVE_DE_RECUPERACAO) {
                const novaSenha = prompt("Acesso autorizado! Digite a sua NOVA senha de login:");
                if (novaSenha && novaSenha.trim().length >= 4) {
                    localStorage.setItem('finance_app_pwd', novaSenha.trim());
                    alert("Senha alterada com sucesso! O aplicativo será reiniciado.");
                    window.location.reload();
                } else if (novaSenha) {
                    alert("Erro: A senha precisa ter pelo menos 4 caracteres.");
                }
            } else {
                alert("Erro: Chave de recuperação inválida. Acesso negado.");
            }
        }

        window.limparBancoDeDados = function() {
            if (confirm("⚠️ ATENÇÃO: Esta ação irá APAGAR todos os lançamentos do seu banco de dados.\n\nDeseja prosseguir?")) {
                const senhaDigitada = prompt("Digite a sua SENHA de acesso para autorizar a limpeza:");
                if (senhaDigitada === obterSenhaAtual()) {
                    if (db) {
                        loadingEl.style.display = 'flex';
                        db.remove().then(() => {
                            alert("Banco de dados reiniciado com sucesso!");
                            window.location.reload();
                        });
                    }
                } else if (senhaDigitada !== null) {
                    alert("Erro: Senha incorreta.");
                }
            }
        }

        window.fazerLogout = function() {
            if (confirm("Deseja bloquear o aplicativo?")) {
                localStorage.removeItem('user_authenticated');
                window.location.reload();
            }
        }

        window.fazerBackup = function() {
            if (transactions.length === 0) {
                alert("O seu banco de dados está vazio.");
                return;
            }
            const dadosJSON = JSON.stringify(transactions, null, 2);
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(dadosJSON);
            const linkDownload = document.createElement('a');
            linkDownload.setAttribute("href", dataStr);
            linkDownload.setAttribute("download", "meu_backup_financeiro.json");
            document.body.appendChild(linkDownload);
            linkDownload.click();
            linkDownload.remove();
        }

        // --- AUTENTICAÇÃO ---
        window.addEventListener('DOMContentLoaded', () => {
            toggleMethodFields();
            const jaLogado = localStorage.getItem('user_authenticated') === 'true';
            if (jaLogado) {
                loginScreen.style.display = 'none';
                appContainer.style.display = 'block';
                loadingEl.style.display = 'flex';
                inicializarFirebase();
            } else {
                loginScreen.style.display = 'flex';
            }
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (loginPassword.value === obterSenhaAtual()) {
                localStorage.setItem('user_authenticated', 'true');
                loginScreen.style.display = 'none';
                appContainer.style.display = 'block';
                loadingEl.style.display = 'flex';
                inicializarFirebase();
            } else {
                loginError.style.display = 'block';
                loginPassword.value = '';
                loginPassword.focus();
            }
        });

        // --- CONFIGURAÇÃO DO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDLlTOuVyPLLYXTEAX__8Sys2RMSV-UX54",
            authDomain: "financeiro-3fe98.firebaseapp.com",
            databaseURL: "https://financeiro-3fe98-default-rtdb.firebaseio.com",
            projectId: "financeiro-3fe98",
            storageBucket: "financeiro-3fe98.firebasestorage.app",
            messagingSenderId: "727786772341",
            appId: "1:727786772341:web:b0590d1da3b6e26ffb653c"
        };

        let db;
        let transactions = [];
        let currentTab = 'pending';
        let selectedMonthKey = '';

        const formAccordion = document.getElementById('form-accordion');
        const form = document.getElementById('finance-form');
        const descInput = document.getElementById('description');
        const amountInput = document.getElementById('amount');
        const dateInput = document.getElementById('due-date');
        const cardOriginInput = document.getElementById('card-origin');
        const listContainer = document.getElementById('transaction-list');
        const monthSelector = document.getElementById('month-selector');
        
        const realBalanceEl = document.getElementById('real-balance');
        const balanceEl = document.getElementById('total-balance');
        const incomeEl = document.getElementById('total-income');
        const expenseEl = document.getElementById('total-expense');

        dateInput.value = new Date().toISOString().split('T')[0];

        function inicializarFirebase() {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database().ref("lancamentos_uXgPdnTq3HFIi19mjp9EZwquTUyukZ76PdrldkNM");

            db.on('value', (snapshot) => {
                const data = snapshot.val();
                transactions = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        transactions.push({ id: key, ...data[key] });
                    });
                }
                loadingEl.style.display = 'none';
                
                gerarFiltroDeMeses();
                updateDashboard();
                renderList();
            }, (error) => {
                alert("Erro de conexão com o Firebase.");
            });
        }

        const NOME_MESES = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];

        function gerarFiltroDeMeses() {
            const mesesSet = new Set();
            const hoje = new Date();
            const mesAtualKey = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
            mesesSet.add(mesAtualKey);

            transactions.forEach(t => {
                if (t.date) {
                    const [ano, mes] = t.date.split('-');
                    mesesSet.add(`${ano}-${mes}`);
                }
            });

            const mesesOrdenados = Array.from(mesesSet).sort();

            if (!selectedMonthKey || !mesesSet.has(selectedMonthKey)) {
                selectedMonthKey = mesesSet.has(mesAtualKey) ? mesAtualKey : mesesOrdenados[mesesOrdenados.length - 1];
            }

            monthSelector.innerHTML = '';
            mesesOrdenados.forEach(key => {
                const [ano, mes] = key.split('-');
                const nomeMes = NOME_MESES[parseInt(mes) - 1];
                const btn = document.createElement('button');
                btn.className = `month-btn ${key === selectedMonthKey ? 'active' : ''}`;
                btn.textContent = `${nomeMes}/${ano}`;
                btn.onclick = () => selectMonth(key);
                monthSelector.appendChild(btn);
            });

            rolarParaMesAtivo();
        }

        function rolarParaMesAtivo() {
            const activeBtn = monthSelector.querySelector('.active');
            if (activeBtn) {
                monthSelector.scrollLeft = activeBtn.offsetLeft - monthSelector.offsetWidth / 2 + activeBtn.offsetWidth / 2;
            }
        }

        function selectMonth(key) {
            selectedMonthKey = key;
            const buttons = monthSelector.querySelectorAll('.month-btn');
            buttons.forEach(btn => {
                const [ano, mes] = key.split('-');
                const nomeMes = NOME_MESES[parseInt(mes) - 1];
                btn.classList.toggle('active', btn.textContent === `${nomeMes}/${ano}`);
            });
            renderList();
        }

        function obterDiasDeAtraso(t) {
            if (t.done || !t.date) return 0;
            const partesVencimento = t.date.split('-');
            const dataVencimento = new Date(Date.UTC(partesVencimento[0], partesVencimento[1] - 1, partesVencimento[2]));
            const hojeLocal = new Date();
            const hoje = new Date(Date.UTC(hojeLocal.getFullYear(), hojeLocal.getMonth(), hojeLocal.getDate()));
            
            const diferencaTempo = hoje.getTime() - dataVencimento.getTime();
            return Math.floor(diferencaTempo / (1000 * 60 * 60 * 24));
        }

        amountInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (!value) { e.target.value = ''; return; }
            let numValue = (parseFloat(value) / 100).toFixed(2);
            let parts = numValue.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            e.target.value = parts.join(',');
        });

        function parseFormattedValue(value) {
            if (!value) return 0;
            return parseFloat(value.replace(/\./g, '').replace(',', '.')) || 0;
        }

        function formatCurrency(value) {
            // Garante que o valor exibido seja sempre absoluto (sem o sinal de menos nativo do toLocaleString)
            return Math.abs(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function formatDate(dateString) {
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.getElementById('tab-pending').classList.toggle('active', tab === 'pending');
            document.getElementById('tab-done').classList.toggle('active', tab === 'done');
            renderList();
        }

        window.confirmTransaction = function(id) {
            if (db) {
                db.child(id).update({ done: true });
            }
        }

        window.editTransactionAmount = function(id) {
            const t = transactions.find(item => item.id === id);
            if (t && db) {
                const valorDigitado = prompt(`Corrigir valor do lançamento "${t.description}":\nValor Atual: ${formatCurrency(t.amount)}\n\nDigite o novo valor correto (Ex: 145,90):`, t.amount.toString().replace('.', ','));
                
                if (valorDigitado === null) return;

                if (valorDigitado.trim() !== "") {
                    const valorFinal = parseFormattedValue(valorDigitado);
                    db.child(id).update({ amount: valorFinal });
                }
            }
        }

        window.deleteTransaction = function(id) {
            if(confirm("Deseja apagar permanentemente este lançamento?")) {
                if (db) db.child(id).remove();
            }
        }

        function updateDashboard() {
            let pendingIncome = 0, pendingExpense = 0, realIncome = 0, realExpense = 0;

            transactions.forEach(t => {
                if (t.done) {
                    if (t.type === 'receber') realIncome += t.amount;
                    else realExpense += t.amount;
                } else {
                    if (t.type === 'receber') pendingIncome += t.amount;
                    else pendingExpense += t.amount;
                }
            });

            const totalIncome = realIncome + pendingIncome;
            const totalExpense = realExpense + pendingExpense;
            const predictedBalance = totalIncome - totalExpense;
            const realBalance = realIncome - realExpense;

            incomeEl.textContent = formatCurrency(pendingIncome);
            expenseEl.textContent = formatCurrency(pendingExpense);
            
            balanceEl.textContent = formatCurrency(predictedBalance);
            balanceEl.style.color = predictedBalance < 0 ? 'var(--expense)' : 'var(--text-color)';

            realBalanceEl.textContent = formatCurrency(realBalance);
            realBalanceEl.style.color = realBalance < 0 ? 'var(--expense)' : 'var(--income)';
        }

        function renderList() {
            listContainer.innerHTML = '';
            const filteredByMonth = transactions.filter(t => t.date && t.date.startsWith(selectedMonthKey));
            const filtered = filteredByMonth.filter(t => currentTab === 'done' ? t.done : !t.done);

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div class="empty-state">Nenhum lançamento ${currentTab === 'done' ? 'realizado' : 'pendente'} neste mês.</div>`;
                return;
            }

            const sorted = [...filtered].sort((a, b) => new Date(a.date) - new Date(b.date));

            sorted.forEach(t => {
                const item = document.createElement('div');
                item.className = 'transaction-item';
                const isRec = t.type === 'receber';
                
                const diasAtraso = obterDiasDeAtraso(t);
                let atrasoMarkup = (diasAtraso > 0 && t.type === 'pagar') ? `<span class="delay-tag">⚠️ Atrasado ${diasAtraso}d</span>` : '';
                
                let métodoText = "";
                if (t.type === 'pagar') {
                    const complementoOrigem = t.cardOrigin ? ` (${t.cardOrigin})` : "";
                    métodoText = t.method === 'credito' 
                        ? `Crédito${complementoOrigem} ${t.installmentText || ''}` 
                        : `Débito/Dinheiro${complementoOrigem}`;
                } else {
                    métodoText = 'Recebimento';
                }

                let actionMarkup = "";
                if (!t.done) {
                    actionMarkup = `
                        <div class="item-actions-group">
                            <button class="action-btn delete-btn" onclick="deleteTransaction('${t.id}')" title="Excluir item">×</button>
                            <button class="action-btn confirm-btn" onclick="confirmTransaction('${t.id}')" title="Confirmar pagamento">✓</button>
                        </div>
                    `;
                } else {
                    actionMarkup = `
                        <div class="item-actions-group">
                            <button class="action-btn delete-btn" onclick="deleteTransaction('${t.id}')" title="Excluir item">×</button>
                        </div>
                    `;
                }

                // Removido os caracteres '+' e '-' antes do valor, confiando 100% na cor definida pelas classes de estilo
                item.innerHTML = `
                    <div class="item-details">
                        <h4>${t.description} ${atrasoMarkup}</h4>
                        <span>${t.done ? 'Realizado em' : 'Vence em'}: ${formatDate(t.date)}</span>
                        <span class="method-badge">${métodoText}</span>
                    </div>
                    <div class="item-right">
                        <div class="value-wrapper">
                            <div class="value-container">
                                <button class="edit-value-btn" onclick="editTransactionAmount('${t.id}')" title="Corrigir valor">✏️</button>
                                <span class="item-value ${isRec ? 'income-text' : 'expense-text'}">${formatCurrency(t.amount)}</span>
                            </div>
                        </div>
                        ${actionMarkup}
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const selectedType = document.querySelector('input[name="type"]:checked').value;
            const description = descInput.value.trim();
            const totalAmount = parseFormattedValue(amountInput.value);
            const baseDate = dateInput.value;

            if (!description || totalAmount <= 0 || !baseDate) return;

            const [ano, mes] = baseDate.split('-');
            let mesAlvoKey = `${ano}-${mes}`;
            let abaAlvo = 'pending';

            if (db) {
                if (selectedType === 'receber') {
                    db.push({
                        type: 'receber',
                        description,
                        amount: totalAmount,
                        date: baseDate,
                        done: false
                    });
                } else {
                    const method = document.querySelector('input[name="method"]:checked').value;
                    const cardOrigin = cardOriginInput.value.trim();
                    
                    if (method === 'debito') {
                        db.push({
                            type: 'pagar',
                            method: 'debito',
                            cardOrigin,
                            description,
                            amount: totalAmount,
                            date: baseDate,
                            done: true
                        });
                        abaAlvo = 'done';
                    } else {
                        const numInstallments = parseInt(document.getElementById('installments').value) || 1;
                        const valorParcela = parseFloat((totalAmount / numInstallments).toFixed(2));
                        const [year, month, day] = baseDate.split('-').map(Number);

                        for (let i = 0; i < numInstallments; i++) {
                            let currentMonth = month + i;
                            let currentYear = year;
                            
                            while (currentMonth > 12) {
                                currentMonth -= 12;
                                currentYear += 1;
                            }

                            const formattedMonth = String(currentMonth).padStart(2, '0');
                            const formattedDay = String(day).padStart(2, '0');
                            const dateParcela = `${currentYear}-${formattedMonth}-${formattedDay}`;

                            if (i === 0) {
                                mesAlvoKey = `${currentYear}-${formattedMonth}`;
                            }

                            db.push({
                                type: 'pagar',
                                method: 'credito',
                                cardOrigin,
                                description: `${description} (${i + 1}/${numInstallments})`,
                                amount: valorParcela,
                                date: dateParcela,
                                installmentText: `(${i + 1}/${numInstallments})`,
                                done: false
                            });
                        }
                    }
                }
            }

            selectedMonthKey = mesAlvoKey;

            descInput.value = '';
            amountInput.value = '';
            cardOriginInput.value = '';
            document.getElementById('installments').value = '1';
            
            formAccordion.removeAttribute('open');
            fecharPainelDeSeguranca();
            
            descInput.focus();
            
            gerarFiltroDeMeses();
            switchTab(abaAlvo);
        });

        // --- PWA ---
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-btn');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isRunningStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        if (!isRunningStandalone) {
            if (isIOS) {
                installBanner.style.display = 'flex';
                installBtn.addEventListener('click', () => {
                    alert("Para instalar no iPhone:\n\n1. Toque no botão de 'Compartilhar' no Safari\n2. Escolha 'Adicionar à Tela de Início'.");
                });
            } else {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    installBanner.style.display = 'flex';
                });
                installBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') installBanner.style.display = 'none';
                        deferredPrompt = null;
                    }
                });
            }
        }
        window.addEventListener('appinstalled', () => { installBanner.style.display = 'none'; });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }
    </script>
</body>
</html>
